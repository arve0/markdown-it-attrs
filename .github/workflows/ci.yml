name: ci

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }} on Linux
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x, 26.x]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Node v${{ matrix.node-version }} on Linux
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          architecture: 'x64'
          cache: 'npm'
      - run: npm ci
      - run: npm test
